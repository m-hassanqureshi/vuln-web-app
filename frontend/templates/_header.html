<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Theme init: must run before first paint to avoid a flash of the
        // wrong theme. Reads localStorage["theme"], falls back to the OS
        // prefers-color-scheme media query, then to "light". Wrapped in
        // try/catch so a private-browsing localStorage throw doesn't block
        // the rest of the page from rendering.
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                if (saved !== 'light' && saved !== 'dark') {
                    saved = null;
                }
                var theme = saved;
                if (!theme && window.matchMedia) {
                    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                if (!theme) {
                    theme = 'light';
                }
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <title>{{title}}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- The toast helper (window.toast.show) is wired into every page via
         this partial. defer so the script runs after the DOM is parsed but
         before window.load -- safe to call from any inline <script> below. -->
    <script src="/static/js/toast.js" defer></script>
</head>
<body {{body_attrs}}>
    <!-- Shared Header: brand, theme toggle, partner logos. The theme-toggle
         button is keyboard-accessible (real <button>, aria-label) and the
         icon flips between 🌙 and ☀ as the theme changes. -->
    <header class="header">
        <div class="header-title">Security Vulnerability Lab</div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode">
            <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
        </button>
        <div class="header-logos">
            <img src="/static/images/PUCIT_Logo.png" alt="PUCIT" class="header-logo">
            <img src="/static/images/excaliat-logo.png" alt="Excaliat" class="header-logo">
            <img src="/static/images/blue-logo-scl2.png" alt="FCCU" class="header-logo">
        </div>
    </header>

    <!-- Theme toggle handler: reads current data-theme, flips to the other,
         persists to localStorage. The reflect() helper keeps the aria-label
         and icon in sync with the current state. -->
    <script>
        (function () {
            var toggle = document.getElementById('theme-toggle');
            if (!toggle) return;

            function reflect(theme) {
                var nextAction = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
                var icon = theme === 'dark' ? '☀' : '🌙';
                toggle.setAttribute('aria-label', nextAction);
                var iconEl = toggle.querySelector('.theme-toggle-icon');
                if (iconEl) iconEl.textContent = icon;
            }

            reflect(document.documentElement.getAttribute('data-theme') || 'light');

            toggle.addEventListener('click', function () {
                var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                try {
                    localStorage.setItem('theme', next);
                } catch (e) {
                    /* persistence unavailable — in-page state still flips */
                }
                reflect(next);
            });
        })();
    </script>
