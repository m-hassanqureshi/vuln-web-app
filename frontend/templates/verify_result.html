{{partial:header}}

<!-- The {{title}} / {{message}} values are server-controlled and
     HTML-escaped before splicing (the route never reflects the raw
     token here — VULN-3 posture). -->
<main class="notice-wrap">
    <div class="notice-card">
        <h2 class="form-title">{{title_msg}}</h2>
        <p class="notice-text">{{message}}</p>
        <a href="/login" class="btn btn-primary">Continue to Login</a>
    </div>
</main>
</body>
</html>
